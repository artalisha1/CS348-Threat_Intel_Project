<!DOCTYPE html>
<!-- HTML5 Document -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Threat Intel Management</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header -->
    <header>
        <!-- Container to center and align the header content -->
        <div class="header-content">
            <h1>Threat Intel Database</h1>
            <p>CS 348 Project - Alisha Gadaginmath</p>
        </div>
    </header>

    <!-- Main layout container -->
    <main class="container">

        <!-- Filter Section -->
        <section class="card filter-section">
            <h2>Filter & Reporting</h2>
            <!-- Filter form used to capture user filter inputs without reloading the page -->
            <form id="filterForm">
                <!-- Form fields container for filter options to be displayed next to each other -->
                <div class="form-row">

                    <!-- Actor filter -->
                    <div class="form-group">
                        <label for="filterActor">Threat Actor</label>
                        <!-- Actor filter dropdown, corresponds to "actor_id" column in the database -->
                        <select id="filterActor" name="actor_id">
                            <!-- Default option that acts as 'All' (no filter applied) -->
                            <option value="">All Actors</option>
                            <!-- Options populated by app.js -->
                        </select>
                    </div>

                    <!-- IOC Type filter -->
                    <div class="form-group">
                        <label for="filterType">IOC Type</label>
                        <!-- Dropdown values for the type of Indicator of Compromise -->
                        <select id="filterType" name="ioc_type">
                            <option value="">All Types</option>
                            <option value="IPv4">IPv4</option>
                            <option value="Domain">Domain</option>
                            <option value="MD5 Hash">MD5 Hash</option>
                            <option value="File Name">File Name</option>
                            <option value="Command">Command</option>
                            <option value="SHA256 Hash">SHA256 Hash</option>
                        </select>
                    </div>

                    <!-- Severity filter -->
                    <div class="form-group">
                        <label for="filterSeverity">Severity</label>
                        <!-- Dropdown to filter records by their Threat Severity level -->
                        <select id="filterSeverity" name="severity">
                            <option value="">All Severities</option>
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>

                    <!-- Column container for filter buttons - apply or clear -->
                    <div class="form-group submit-col">
                        <!-- Button that triggers the filterForm submission event in app.js -->
                        <button type="submit" class="btn btn-primary">Apply Filters</button>
                        <button type="button" id="clearFiltersBtn" class="btn btn-secondary">Clear</button>
                    </div>
                </div>
            </form>
        </section>

        <!-- Data Table Section -->
        <section class="card table-section">
            <!-- Header area for the table - includes title and "Add New" button -->
            <div class="table-header">
                <h2>Indicators of Compromise (IOCs)</h2>
                <div style="display: flex; gap: 10px;">
                    <button id="addTransactionBtn" class="btn btn-primary">+ Add Actor & IOC</button>
                    <button id="addIocBtn" class="btn btn-success">+ Add New IOC</button>
                </div>
            </div>

            <!-- Responsive table wrapper to make the table scrollable -->
            <div class="table-responsive">
                <table id="iocTable">
                    <!-- The table header row listing the column names -->
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Threat Actor</th>
                            <th>IOC Value</th>
                            <th>Type</th>
                            <th>Severity</th>
                            <th>Description</th>
                            <!-- Actions column for the Edit/Delete buttons -->
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <!-- Dynamic table body where rows are populated by app.js by fetching from the MySQL DB -->
                    <tbody id="iocTableBody">

                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Add/Edit Modal - hidden initially, displayed when user clicks "Add New IOC" or "Edit" button -->
    <div id="iocModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New IOC</h2>
                <!-- used to close the modal popup -->
                <span class="close-btn">&times;</span>
            </div>

            <!-- IOC Form used to add or edit IOCs -->
            <form id="iocForm">
                <!-- A hidden input field storing the ID of the record being edited -->
                <!-- If empty, the app knows the user is adding a new record -->
                <input type="hidden" id="iocId" name="id">

                <!-- Actor selection -->
                <div class="form-group">
                    <label for="actorId" style="display: flex; justify-content: space-between;">
                        <span>Threat Actor *</span>

                    </label>
                    <select id="actorId" name="actor_id" required>
                        <option value="">-- Select Actor --</option>
                        <!-- Options populated by app.js using the actor_id and name from the database -->
                    </select>
                </div>

                <!-- IOC Value input -->
                <div class="form-group">
                    <label for="iocValue">IOC Value *</label>
                    <input type="text" id="iocValue" name="ioc_value" required placeholder="e.g. 192.168.1.1">
                </div>

                <!-- IOC Type selection -->
                <div class="form-group">
                    <label for="iocType">IOC Type *</label>
                    <select id="iocType" name="ioc_type" required>
                        <option value="">-- Select Type --</option>
                        <option value="IPv4">IPv4</option>
                        <option value="Domain">Domain</option>
                        <option value="MD5 Hash">MD5 Hash</option>
                        <option value="File Name">File Name</option>
                        <option value="Command">Command</option>
                        <option value="SHA256 Hash">SHA256 Hash</option>
                    </select>
                </div>

                <!-- Severity selection -->
                <div class="form-group">
                    <label for="severity">Severity *</label>
                    <select id="severity" name="severity" required>
                        <option value="">-- Select Severity --</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>

                <!-- Multi-line text area for the IOC description/notes -->
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3"
                        placeholder="Additional context about this indicator"></textarea>
                </div>

                <!-- Modal controls which contains the cancel and save buttons for the form-->
                <div class="modal-footer">
                    <!-- Button to close the modal without saving any changes -->
                    <button type="button" class="btn btn-secondary close-modal-btn">Cancel</button>
                    <!-- Submit button that triggers the iocForm submission event (captured by app.js) -->
                    <button type="submit" class="btn btn-primary" id="saveIocBtn">Save IOC</button>
                </div>
            </form>
        </div>
    </div>



    <!-- Transaction Modal for adding both Actor and IOC simultaneously -->
    <div id="transactionModal" class="modal" style="z-index: 60;">
        <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
            <!-- Header area for the modal -->
            <div class="modal-header">
                <h2>Add Actor & IOC Simultaneously</h2>
                <!-- Close button to dismiss the modal -->
                <span class="close-transaction-btn"
                    style="cursor: pointer; font-size: 1.5rem; color: var(--text-muted);">&times;</span>
            </div>
            <!-- Form used to submit both new actor and new IOC data -->
            <form id="transactionForm">
                <h3
                    style="margin-bottom: 1rem; color: var(--text-main); font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                    Threat Actor Details</h3>
                <!-- Form group for the Threat Actor Name text input -->
                <div class="form-group">
                    <label for="transActorName">Actor Name *</label>
                    <input type="text" id="transActorName" name="name" required placeholder="e.g. APT29">
                </div>
                <!-- Form group for the Threat Actor Organization Type input -->
                <div class="form-group">
                    <label for="transActorOrgType">Organization Type</label>
                    <input type="text" id="transActorOrgType" name="org_type" placeholder="e.g. State-Sponsored">
                </div>
                <!-- Form group for the Threat Actor Origin Country input -->
                <div class="form-group">
                    <label for="transActorOrigin">Origin Country</label>
                    <input type="text" id="transActorOrigin" name="origin_country" placeholder="e.g. Russia">
                </div>

                <!-- Section heading for the IOC details, separating it from the Actor details visually -->
                <h3
                    style="margin-top: 1.5rem; margin-bottom: 1rem; color: var(--text-main); font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                    IOC Details</h3>
                <!-- Form group for the IOC Value text input -->
                <div class="form-group">
                    <label for="transIocValue">IOC Value *</label>
                    <input type="text" id="transIocValue" name="ioc_value" required placeholder="e.g. 192.168.1.1">
                </div>
                <!-- Form group for selecting the IOC Type from a dropdown menu -->
                <div class="form-group">
                    <label for="transIocType">IOC Type *</label>
                    <select id="transIocType" name="ioc_type" required>
                        <option value="">-- Select Type --</option>
                        <option value="IPv4">IPv4</option>
                        <option value="Domain">Domain</option>
                        <option value="MD5 Hash">MD5 Hash</option>
                        <option value="File Name">File Name</option>
                        <option value="Command">Command</option>
                        <option value="SHA256 Hash">SHA256 Hash</option>
                    </select>
                </div>
                <!-- Form group for selecting the Threat Severity level from a dropdown menu -->
                <div class="form-group">
                    <label for="transSeverity">Severity *</label>
                    <select id="transSeverity" name="severity" required>
                        <option value="">-- Select Severity --</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>
                <!-- Form group for adding a multi-line textual description of the IOC -->
                <div class="form-group">
                    <label for="transDescription">Description</label>
                    <textarea id="transDescription" name="description" rows="2"
                        placeholder="Additional context"></textarea>
                </div>
                <!-- Cancel and Save buttons for the overall form -->
                <div class="modal-footer" style="margin-top: 1.5rem;">
                    <button type="button" class="btn btn-secondary close-transaction-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Both</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Main logic -->
    <script src="app.js"></script>
</body>

</html>
